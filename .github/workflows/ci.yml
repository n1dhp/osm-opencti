name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    # Mirrors the connector's 6-hour fetch cadence — pure uptime monitoring.
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  # 1.1 — Fail if a developer pushed an API key / token / sensitive endpoint.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so leaks in past commits are caught
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # 1.3 — Linting / coding best practices.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  # 1.4 — Confirm the Docker image builds and the connector boots without crashing,
  #       plus unit tests on the STIX conversion.
  docker-build-test:
    name: Docker build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t osm-opencti:ci .

      - name: Smoke test — modules import & connector starts without OpenCTI
        run: |
          # The connector needs a live OpenCTI to fully run; here we only assert
          # it boots far enough to import all modules and fail on *connection*,
          # not on a syntax/import error. A non-import crash is acceptable.
          set +e
          output=$(docker run --rm \
            -e OPENCTI_URL=http://127.0.0.1:1 \
            -e OPENCTI_TOKEN=ci-dummy \
            -e CONNECTOR_ID=00000000-0000-0000-0000-000000000000 \
            -e OPENSOURCEMALWARE_API_TOKEN=ci-dummy \
            osm-opencti:ci 2>&1)
          echo "$output"
          if echo "$output" | grep -qiE "ImportError|ModuleNotFoundError|SyntaxError|NameError"; then
            echo "::error::Connector failed on an import/syntax error"
            exit 1
          fi
          echo "No import/syntax errors detected."

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: |
          pip install -r requirements.txt pytest
          pytest -q

  # 1.2 — Is the opensourcemalware endpoint UP? Non-blocking: a 3rd-party outage
  #        should never block your merges. Reports status as a warning instead.
  endpoint-health:
    name: OSM endpoint health (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Probe opensourcemalware API
        run: |
          url="https://api.opensourcemalware.com/functions/v1/query-latest?ecosystem=npm"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "000")
          echo "HTTP status: $code"
          # 200 = up; 401/403 = up but auth-gated (still reachable). Anything else = warn.
          if [ "$code" = "200" ] || [ "$code" = "401" ] || [ "$code" = "403" ]; then
            echo "opensourcemalware API is reachable (HTTP $code)."
          else
            echo "::warning::opensourcemalware API may be DOWN (HTTP $code)"
            exit 1
          fi
