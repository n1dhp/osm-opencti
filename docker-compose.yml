version: '3'
services:
  connector-opensourcemalware-v1:
    build: .
    environment:
      # OpenCTI
      - OPENCTI_URL=https://your-opencti-instance.example.com/
      - OPENCTI_TOKEN=ChangeMe
      # Connector
      - CONNECTOR_ID=ChangeMe   # a fresh UUIDv4, e.g. `uuidgen`
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_NAME=Open Source Malware
      - CONNECTOR_SCOPE=malware
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_DURATION_PERIOD=PT6H
      # opensourcemalware.com
      - OPENSOURCEMALWARE_API_BASE_URL=https://api.opensourcemalware.com/functions/v1
      - OPENSOURCEMALWARE_API_TOKEN=ChangeMe
      - OPENSOURCEMALWARE_ECOSYSTEMS=npm,pypi
      - OPENSOURCEMALWARE_LABEL=opensourcemalware
      - OPENSOURCEMALWARE_VERIFIED_ONLY=true
    restart: always
