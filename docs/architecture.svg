<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1370 335" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0.5" y="0.5" width="1369" height="334" rx="10" fill="#ffffff" stroke="#e2e8f0"/>

  <!-- title -->
  <text x="30" y="38" font-size="20" font-weight="700" fill="#0f172a">OSM &#8594; STIX &#8594; OpenCTI &#183; ingestion pipeline</text>
  <text x="30" y="60" font-size="12.5" fill="#64748b">External-import connector &#8212; fetches every 6 hours, converts to STIX 2.1, imports into OpenCTI.</text>

  <!-- scheduler pill -->
  <rect x="315" y="70" width="180" height="42" rx="10" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="405" y="89" font-size="12" font-weight="700" text-anchor="middle" fill="#6b21a8">&#9201; pycti scheduler</text>
  <text x="405" y="105" font-size="11" text-anchor="middle" fill="#7c3aed">schedule_iso &#183; every 6h</text>
  <line x1="405" y1="112" x2="405" y2="147" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A: OSM -->
  <rect x="30" y="150" width="190" height="95" rx="10" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="125" y="183" font-size="15" font-weight="700" text-anchor="middle" fill="#0f172a">opensourcemalware.com</text>
  <text x="125" y="205" font-size="12" text-anchor="middle" fill="#475569">GET /query-latest</text>
  <text x="125" y="223" font-size="12" text-anchor="middle" fill="#475569">per ecosystem: npm, pypi</text>

  <!-- B: Fetch -->
  <rect x="310" y="150" width="190" height="95" rx="10" fill="#eff6ff" stroke="#2563eb"/>
  <text x="405" y="183" font-size="15" font-weight="700" text-anchor="middle" fill="#0f172a">Connector &#183; Fetch</text>
  <text x="405" y="205" font-size="12" text-anchor="middle" fill="#475569">client.query_latest()</text>
  <text x="405" y="223" font-size="12" text-anchor="middle" fill="#475569">Bearer token</text>

  <!-- C: Convert -->
  <rect x="590" y="150" width="190" height="95" rx="10" fill="#eff6ff" stroke="#2563eb"/>
  <text x="685" y="183" font-size="15" font-weight="700" text-anchor="middle" fill="#0f172a">Convert &#8594; STIX 2.1</text>
  <text x="685" y="205" font-size="12" text-anchor="middle" fill="#475569">ThreatConverter</text>
  <text x="685" y="223" font-size="12" text-anchor="middle" fill="#475569">Malware SDOs + Identity</text>

  <!-- D: OpenCTI -->
  <rect x="870" y="150" width="190" height="95" rx="10" fill="#f0fdfa" stroke="#0f766e"/>
  <text x="965" y="183" font-size="15" font-weight="700" text-anchor="middle" fill="#0f172a">OpenCTI</text>
  <text x="965" y="205" font-size="12" text-anchor="middle" fill="#475569">send_stix2_bundle()</text>
  <text x="965" y="223" font-size="12" text-anchor="middle" fill="#475569">upsert by STIX id</text>

  <!-- E: Subscribers (future) -->
  <rect x="1150" y="150" width="190" height="95" rx="10" fill="#f9fafb" stroke="#9ca3af" stroke-dasharray="6 4"/>
  <text x="1245" y="183" font-size="15" font-weight="700" text-anchor="middle" fill="#6b7280">Subscribers</text>
  <text x="1245" y="205" font-size="12" text-anchor="middle" fill="#9ca3af">Vector by Datadog &#8230;</text>
  <text x="1245" y="223" font-size="12" text-anchor="middle" fill="#9ca3af">(future)</text>

  <!-- arrows between stages -->
  <line x1="220" y1="197" x2="308" y2="197" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="264" y="190" font-size="11" text-anchor="middle" fill="#475569">threats</text>

  <line x1="500" y1="197" x2="588" y2="197" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="544" y="190" font-size="11" text-anchor="middle" fill="#475569">verified only</text>

  <line x1="780" y1="197" x2="868" y2="197" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="824" y="190" font-size="11" text-anchor="middle" fill="#475569">STIX bundle</text>

  <line x1="1060" y1="197" x2="1148" y2="197" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowg)"/>
  <text x="1104" y="190" font-size="11" text-anchor="middle" fill="#9ca3af">export</text>

  <!-- connector grouping bracket -->
  <path d="M310,262 L310,270 L780,270 L780,262" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="545" y="287" font-size="12" font-weight="600" text-anchor="middle" fill="#475569">OpenCTI Connector (this repo)</text>

  <!-- footnote -->
  <text x="30" y="318" font-size="11" fill="#94a3b8">Cadence &amp; ecosystems are env-configured (CONNECTOR_DURATION_PERIOD=PT6H, OPENSOURCEMALWARE_ECOSYSTEMS=npm,pypi).</text>
</svg>
